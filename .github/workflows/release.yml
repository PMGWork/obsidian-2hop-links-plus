name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

env:
  PLUGIN_ID: 2hop-links-plus

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build
        run: |
          npm install
          npm run build
          mkdir "${{ env.PLUGIN_ID }}"
          cp main.js manifest.json styles.css "${{ env.PLUGIN_ID }}"
          zip -r "${{ env.PLUGIN_ID }}-${{ github.ref_name }}.zip" "${{ env.PLUGIN_ID }}"

      - name: Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: false
          prerelease: false
          files: |
            main.js
            manifest.json
            styles.css
            ${{ env.PLUGIN_ID }}-${{ github.ref_name }}.zip
